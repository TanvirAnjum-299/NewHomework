<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>
    <div class="topnav">
        <a href="index.html">Home</a>
        <a href="aboutmeindex.html">About Me</a>
        <a href="myachievementsindex.html">My Achievements</a>
        <a href="mygalleryindex.html">Gallery</a>
        <a href="myprojects.html">Projects</a>
        <a class="active" href="contactme.html">Contact Me</a>
    </div><br>

    <style>
        .topnav {
            background-color: #333;
            overflow: hidden;
        }
        .topnav a {
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }
        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }
        .topnav a.active {
            background-color: #4CAF50;
            color: white;
        }
      </style>
      <div class="container" style="background-color: #ECBEC9;"id="contact">
    <h2 class="fw-bold text-center mb-4">Contact Me</h2>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <form id="contactForm" action="https://formspree.io/f/YOUR_ID" method="POST">
          <input class="form-control mb-3" name="name" placeholder="Your name" required>
          <input class="form-control mb-3" name="email" type="email" placeholder="Your email" required>
          <textarea class="form-control mb-3" name="message" rows="3" placeholder="Your message" required></textarea>
          <button class="btn btn-success w-100 fw-bold" type="submit">Send Message</button>
        </form>
        <div class="alert alert-success mt-3 d-none" id="sentOk">Message sent ✅</div>
        <div class="alert alert-danger mt-3 d-none" id="sentFail">Oops! Try again</div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const formData = new FormData(this);
      fetch(this.action, {
        method: this.method,
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          document.getElementById('sentOk').classList.remove('d-none');
          this.reset();
        } else {
          document.getElementById('sentFail').classList.remove('d-none');
        }
      }).catch(() => {
        document.getElementById('sentFail').classList.remove('d-none');
      });
    });
    </script>
</body>
</html>
